services:
  hive-mind:
    build:
      context: .
      dockerfile: Dockerfile.hivemind
    container_name: hive-mind
    ports:
      - "127.0.0.1:9443:9443"
    environment:
      - PYTHONUNBUFFERED=1
      - HIVE_MIND_TOKEN=${HIVE_MIND_TOKEN}
    volumes:
      - ./nodes.json:/app/nodes.json
    networks:
      - rabbithole-net

  architect-ai:
    build:
      context: .
      dockerfile: Dockerfile.architect
    container_name: architect-ai
    environment:
      - HIVE_MIND_TOKEN=${HIVE_MIND_TOKEN}
      - HUB_URL=https://hive-mind:9443
    depends_on:
      - hive-mind
    networks:
      - rabbithole-net

  rabbithole-1:
    build:
      context: .
      dockerfile: Dockerfile.rabbithole
    container_name: rabbithole-1
    ports:
      - "127.0.0.1:8888:8888"
      - "21:2121"
      - "2222:2222"
      - "80:8080"
    environment:
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASS=${DASHBOARD_PASS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - VERIFY_SSL_HUB=${VERIFY_SSL_HUB}
      - HIVE_MIND_TOKEN=${HIVE_MIND_TOKEN}
      - LEGAL_INTEGRITY_KEY=${LEGAL_INTEGRITY_KEY}
      - HUB_URL=https://hive-mind:9443
    volumes:
      - ./logs:/app/logs
      - ./quarantine:/app/quarantine
    depends_on:
      - hive-mind
    networks:
      - rabbithole-net

  rabbithole-2:
    build:
      context: .
      dockerfile: Dockerfile.rabbithole
    container_name: rabbithole-2
    ports:
      - "8082:8080"
      - "2122:2121"
