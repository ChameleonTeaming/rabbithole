<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff55;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#050505"/>
  
  <!-- Circuit Board Background -->
  <path d="M50 50 H450 V450 H50 Z" fill="none" stroke="#111" stroke-width="2"/>
  <path d="M100 100 L150 100 L150 150 M350 100 L300 100 L300 150 M100 400 L150 400 L150 350 M350 400 L300 400 L300 350" stroke="#222" stroke-width="2" fill="none"/>
  
  <!-- Chameleon Eye / Camera Lens -->
  <circle cx="250" cy="250" r="120" stroke="url(#neon)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <circle cx="250" cy="250" r="80" stroke="#333" stroke-width="20" stroke-dasharray="40 10" fill="none">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="250" r="40" fill="#00f3ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Text -->
  <text x="250" y="420" text-anchor="middle" font-family="monospace" font-size="24" fill="#fff" letter-spacing="5">CHAMELEON TEAM</text>
  <text x="250" y="450" text-anchor="middle" font-family="monospace" font-size="12" fill="#666" letter-spacing="2">ACTIVE ADAPTATION</text>
</svg>